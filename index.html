<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RATPIE DQUARTIER · 93</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 30px;
            border-bottom: 1px solid rgba(255,204,0,0.15);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-family: 'Anton', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffcc00, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav {
            display: flex;
            gap: 25px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .nav a { color: #aaa; text-decoration: none; transition: 0.3s; }
        .nav a:hover { color: #ffcc00; }

        /* ===== L'IMAGE ===== */
        .my-image {
            width: 100%;
            height: 400px;
            background-image: url('079AC749-C1BB-4E87-89B2-938D555F488D.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 24px;
            border: 3px solid #ffcc00;
            margin: 30px 0;
            box-shadow: 0 0 60px rgba(255,204,0,0.08);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .card {
            background: linear-gradient(145deg, #141414, #1a1a1a);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            border: 1px solid rgba(255,204,0,0.08);
            transition: 0.4s;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: #ffcc00;
            box-shadow: 0 10px 40px rgba(255,204,0,0.08);
        }
        .card .mockup {
            height: 200px;
            background: #1a1a1a;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Anton', sans-serif;
            font-size: 1.2rem;
            color: #ffcc00;
            border: 1px solid #2a2a2a;
            margin-bottom: 15px;
            padding: 10px;
            text-align: center;
        }
        .card h3 { font-size: 1.2rem; }
        .card .price {
            font-family: 'Anton', sans-serif;
            font-size: 1.8rem;
            color: #ffcc00;
            margin: 10px 0;
        }
        .btn {
            background: linear-gradient(135deg, #ffcc00, #ff8800);
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #0a0a0a;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 30px rgba(255,204,0,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ffcc00;
            color: #ffcc00;
            margin-top: 8px;
        }
        .btn-outline:hover { background: #ffcc00; color: #0a0a0a; }
        .footer {
            margin-top: 50px;
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.04);
            color: #555;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }
        .footer strong { color: #ffcc00; }
        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: center; }
            .my-image { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <div class="logo">RATPIE·DQUARTIER</div>
        <nav class="nav">
            <a href="#">Collection</a>
            <a href="#">93</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- ===== TON IMAGE ===== -->
    <div class="my-image"></div>

    <!-- PRODUITS -->
    <div class="grid">
        <div class="card">
            <div class="mockup">RATPIE<br/>93</div>
            <h3>RATPIE 93</h3>
            <div class="price">29,90 €</div>
            <button class="btn" onclick="alert('✅ Ajouté !')">Ajouter</button>
            <button class="btn btn-outline">Détail</button>
        </div>
        <div class="card">
            <div class="mockup">DQUARTIER<br/>ON CONNAÎT</div>
            <h3>DQUARTIER</h3>
            <div class="price">32,90 €</div>
            <button class="btn" onclick="alert('✅ Ajouté !')">Ajouter</button>
            <button class="btn btn-outline">Détail</button>
        </div>
        <div class="card">
            <div class="mockup">93<br/>LA RUE</div>
            <h3>93 LA RUE</h3>
            <div class="price">34,90 €</div>
            <button class="btn" onclick="alert('✅ Ajouté !')">Ajouter</button>
            <button class="btn btn-outline">Détail</button>
        </div>
    </div>

    <div class="footer">
        <strong>RATPIE DQUARTIER</strong> · 93 · ON CONNAÎT LA RUE
    </div>

</div>

</body>
</html>
